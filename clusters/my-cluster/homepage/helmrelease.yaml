apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 1h
  timeout: 5m
  chart:
    spec:
      chart: homepage
      version: "2.x"
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: flux-system
  values:
    service:
      main:
        type: LoadBalancer
    env:
      HOMEPAGE_ALLOWED_HOSTS: "*"
